<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viktor Hajduk</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <!-- Horní lišta s navigací -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Viktor Hajduk</a>
            <ul class="nav-menu">
                <li><a href="aboutme.html" class="nav-link">O mně</a></li>
                <li><a href="contact.html" class="nav-link">Kontakt</a></li>
                <li><a href="projects.html" class="nav-link">Projekty</a></li>
                <li><button class="theme-toggle" id="themeToggle" aria-label="Přepnout režim">🌙</button></li>
            </ul>
        </div>
    </nav>

    <!-- Hlavní obsah -->
    <main>
        <section class="section">
            <div class="container">
                <h1>Služby</h1>
                <p>Obsah této stránky byl přesunut do sekce Projekty.</p>
                <p>Pokračuj na stránku <a href="projects.html">Projekty</a>.</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Moje stránka. Všechna práva vyhrazena.</p>
    </footer>

    <script>
        // Dark mode toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Načíst uložený režim z localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeButton(savedTheme);
        
        // Posluchač kliknutí na tlačítko
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        });
        
        function updateThemeButton(theme) {
            themeToggle.textContent = theme === 'light' ? '☽' : '☀';
        }
    </script>
</body>
</html>
